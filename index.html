<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CBSE Registration Photo Tool</title>
    <meta
      name="description"
      content="A free open-source CBSE board photo formatter for students and teachers."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <nav class="topbar" aria-label="Main navigation">
        <a class="brand" href="#" aria-label="CBSE Registration home">
          <span class="brand-mark">CR</span>
          <span>CBSE Registration</span>
        </a>
        <a
          class="source-badge"
          href="https://github.com/Safwatsohail/cbse-registration-photo-tool"
          target="_blank"
          rel="noreferrer"
          aria-label="Open source"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2C6.48 2 2 6.58 2 12.25c0 4.52 2.87 8.35 6.84 9.7.5.09.68-.22.68-.49v-1.72c-2.78.62-3.37-1.37-3.37-1.37-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.36 9.36 0 0 1 12 6.95c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9v2.79c0 .27.18.59.69.49A10.16 10.16 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z"
            />
          </svg>
          <span>Open Source</span>
        </a>
      </nav>

      <section class="hero" aria-labelledby="page-title">
        <div class="hero-copy">
          <h1 id="page-title">Perfect CBSE Board Photos. In One Click.</h1>
          <p>
            No more manual resizing or background hassle. Completely free for
            10th-grade students and teachers.
          </p>
        </div>

        <label class="glass-workspace" id="dropzone" for="photoInput">
          <input id="photoInput" type="file" accept="image/*" />
          <div class="comparison" aria-label="Photo transformation preview">
            <figure class="sample original-card">
              <img
                src="assets/student-original.jpg"
                alt="Original student photo"
              />
              <figcaption>Original Photo</figcaption>
            </figure>

            <div class="curved-arrow" aria-hidden="true">
              <svg viewBox="0 0 160 90">
                <path d="M12 64C42 16 94 12 137 39" />
                <path d="M123 42L140 41L133 25" />
              </svg>
            </div>

            <figure class="sample standard-card">
              <div class="standard-photo">
                <img
                  src="assets/student-original.jpg"
                  alt="CBSE standard student photo"
                />
                <div class="sample-label">
                  <strong>JOHN DOE</strong>
                  <span>24/06/2026</span>
                </div>
              </div>
              <figcaption>CBSE Standard</figcaption>
            </figure>
          </div>

          <span class="upload-cta">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 16V4m0 0 5 5m-5-5L7 9" />
              <path d="M5 15v3a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-3" />
            </svg>
            Click or Drag Photo to Start
          </span>
        </label>
      </section>
    </main>

    <section class="editor-screen" id="editorScreen" aria-labelledby="editorTitle" aria-hidden="true">
      <div class="editor-card">
        <button class="close-button" id="closeEditor" type="button" aria-label="Close editor">
          &times;
        </button>

        <div class="editor-heading">
          <p>CBSE photo maker</p>
          <h2 id="editorTitle">Preview and download</h2>
        </div>

        <div class="editor-grid">
          <form class="control-panel" id="photoForm">
            <label>
              Your name
              <input id="studentName" type="text" placeholder="JOHN DOE" />
            </label>
            <label>
              Date
              <input id="photoDate" type="date" />
            </label>
            <label>
              Gmail address
              <input
                id="gmailInput"
                name="email"
                type="email"
                inputmode="email"
                placeholder="student@gmail.com"
                pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
                required
              />
            </label>
            <input type="hidden" name="_subject" value="New CBSE Registration Tool user" />
            <input type="hidden" name="_captcha" value="false" />
            <input type="hidden" name="_template" value="table" />
            <button class="primary-button" id="downloadBtn" type="submit" disabled>
              Add your Gmail for further steps
            </button>
            <p id="emailStatus" role="status"></p>
          </form>

          <div class="preview-panel">
            <div class="preview-toolbar">
              <span id="statusText">Waiting for photo</span>
              <span id="fileMeta">JPG under 40 KB</span>
            </div>
            <canvas id="outputCanvas" width="300" height="300"></canvas>
          </div>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
